<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌴 Moje Tenerife</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sand: #F5EDD6; --ocean: #1A6E8C; --night: #12202B;
  --panel: #0E1A23; --border: rgba(245,237,214,0.12);
}
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--night); color: var(--sand); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
header { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--panel); }
header h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.3px; }
header .sub { font-size: 0.65rem; color: rgba(245,237,214,0.4); text-transform: uppercase; letter-spacing: 1px; margin-left: 8px; }

/* LAYOUT */
.layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 200px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 6px; }
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(245,237,214,0.1); border-radius: 2px; }
.cat-label { font-size: 0.58rem; font-weight: 700; color: rgba(245,237,214,0.25); text-transform: uppercase; letter-spacing: 1.5px; padding: 8px 6px 3px; }
.place-btn { display: flex; align-items: center; gap: 7px; width: 100%; padding: 7px 8px; border-radius: 7px; border: 1px solid transparent; background: transparent; color: rgba(245,237,214,0.7); font-size: 0.75rem; font-weight: 500; cursor: pointer; text-align: left; transition: all .15s; }
.place-btn:hover { background: rgba(245,237,214,0.06); color: var(--sand); }
.place-btn.active { background: rgba(26,110,140,0.25); border-color: rgba(26,110,140,0.5); color: var(--sand); }
.pb-stars { font-size: 0.6rem; color: #f0c040; margin-left: auto; flex-shrink: 0; }

/* MAP AREA */
.map-area { flex: 1; position: relative; overflow: hidden; background: #1a3a5c; }
.map-container { position: relative; width: 100%; height: 100%; }

/* Tenerife SVG background */
.tenerife-bg { width: 100%; height: 100%; object-fit: contain; opacity: 0.9; }

/* PINS */
.pin { position: absolute; transform: translate(-50%, -100%); cursor: pointer; z-index: 10; transition: transform .15s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
.pin:hover { transform: translate(-50%, -100%) scale(1.2); z-index: 20; }
.pin.active { transform: translate(-50%, -100%) scale(1.25); z-index: 20; }
.pin-dot { width: 32px; height: 32px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 3px 8px rgba(0,0,0,0.4); }
.pin-emoji { transform: rotate(45deg); font-size: 14px; }

/* INFO PANEL */
.info-panel { position: absolute; bottom: 0; left: 0; right: 0; max-height: 70%; background: var(--panel); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; z-index: 100; transform: translateY(100%); transition: transform .3s ease; display: flex; flex-direction: column; }
.info-panel.open { transform: translateY(0); }
.panel-handle { width: 36px; height: 4px; background: rgba(245,237,214,0.2); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
.panel-close { position: absolute; top: 8px; right: 12px; background: transparent; border: none; color: rgba(245,237,214,0.5); font-size: 18px; cursor: pointer; padding: 4px; }

/* PHOTO */
.panel-photo { width: 100%; height: 140px; object-fit: cover; flex-shrink: 0; }
.panel-photo-placeholder { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background: rgba(26,110,140,0.15); flex-shrink: 0; }
.photo-nav { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 5; }
.photo-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; }
.photo-dot.active { background: #fff; }

/* PANEL BODY */
.panel-body { flex: 1; overflow-y: auto; padding: 12px 14px 20px; }
.panel-body::-webkit-scrollbar { width: 3px; }
.p-cat { font-size: 0.58rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ocean); background: rgba(26,110,140,0.18); border-radius: 4px; padding: 2px 6px; display: inline-block; margin-bottom: 6px; }
.p-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
.p-stars { font-size: 1rem; color: #f0c040; margin-bottom: 8px; }
.p-rating-text { font-size: 0.7rem; color: rgba(245,237,214,0.4); margin-left: 6px; }
.p-desc { font-size: 0.76rem; line-height: 1.55; color: rgba(245,237,214,0.6); margin-bottom: 10px; }
.p-notes { background: rgba(245,237,214,0.04); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; }
.p-notes-lbl { font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(245,237,214,0.3); margin-bottom: 4px; }
.p-notes-txt { font-size: 0.76rem; line-height: 1.5; color: rgba(245,237,214,0.7); white-space: pre-wrap; }
.p-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.p-tag { font-size: 0.64rem; background: rgba(245,237,214,0.06); border: 1px solid rgba(245,237,214,0.1); border-radius: 20px; padding: 2px 8px; color: rgba(245,237,214,0.6); }
.edit-btn { width: 100%; padding: 9px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--sand); font-size: 0.78rem; font-weight: 600; cursor: pointer; }
.edit-btn:hover { background: rgba(245,237,214,0.06); }

/* EDIT MODE */
.edit-panel { display: none; }
.e-label { font-size: 0.6rem; font-weight: 700; color: rgba(245,237,214,0.35); text-transform: uppercase; letter-spacing: 1px; display: block; margin: 10px 0 3px; }
.e-input, .e-textarea { width: 100%; padding: 7px 9px; background: rgba(245,237,214,0.05); border: 1px solid var(--border); border-radius: 7px; color: var(--sand); font-size: 0.78rem; outline: none; font-family: inherit; }
.e-textarea { resize: vertical; min-height: 65px; line-height: 1.4; }
.star-row { display: flex; gap: 5px; margin: 4px 0; }
.star-row span { font-size: 1.4rem; cursor: pointer; opacity: 0.3; transition: opacity .1s; }
.star-row span.on { opacity: 1; color: #f0c040; }
.save-btn { width: 100%; padding: 9px; border-radius: 8px; border: none; background: var(--ocean); color: #fff; font-size: 0.82rem; font-weight: 700; cursor: pointer; margin-top: 12px; }
.cancel-btn { width: 100%; padding: 7px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: rgba(245,237,214,0.4); font-size: 0.75rem; cursor: pointer; margin-top: 5px; font-family: inherit; }

/* Photo upload in panel */
.photo-upload-row { display: flex; gap: 6px; margin-top: 10px; }
.photo-upload-btn { flex: 1; padding: 7px; border-radius: 7px; border: 1px dashed rgba(245,237,214,0.2); background: transparent; color: rgba(245,237,214,0.5); font-size: 0.72rem; cursor: pointer; font-family: inherit; }

/* Ocean background gradient */
.map-area { background: linear-gradient(135deg, #1a3a5c 0%, #0d2035 100%); }
</style>
</head>

<header>
  <div style="display:flex;align-items:baseline">
    <h1>🌴 Moje Tenerife</h1>
    <span class="sub">Cestovní deník</span>
  </div>
</header>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="map-area">
    <div class="map-container" id="mapContainer">

        <g transform="translate(840,540)">

          <line x1="0" y1="-15" x2="0" y2="15" stroke="rgba(245,237,214,0.3)" stroke-width="1"/>

        </g>

        <text x="30" y="580" fill="rgba(245,237,214,0.3)" font-size="9">© OpenStreetMap contributors</text>
      </svg>
      <!-- Pins will be injected here -->
      <div id="pinsContainer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></div>
    </div>

    <!-- INFO PANEL (bottom sheet) -->
    <div class="info-panel" id="infoPanel">
      <div class="panel-handle"></div>
      <button class="panel-close" id="panelClose">✕</button>
      <div style="position:relative;flex-shrink:0">
        <div id="panelPhotoWrap"></div>
        <div class="photo-nav" id="photoNav"></div>
      </div>
      <div class="panel-body">
        <!-- VIEW -->
        <div id="viewPanel">
          <div class="p-cat" id="vCat"></div>
          <div class="p-name" id="vName"></div>
          <div style="margin-bottom:8px">
            <span class="p-stars" id="vStars"></span>
            <span class="p-rating-text" id="vRatingText"></span>
          </div>
          <div class="p-desc" id="vDesc"></div>
          <div class="p-notes" id="vNotesBlock" style="display:none">
            <div class="p-notes-lbl">Moje zápisky</div>
            <div class="p-notes-txt" id="vNotes"></div>
          </div>
          <div class="p-tags" id="vTags"></div>
          <button class="edit-btn" id="editBtn">✏️ Upravit / přidat zápisky</button>
        </div>
        <!-- EDIT -->
        <div id="editPanel" class="edit-panel">
          <span class="e-label">Název</span>
          <input class="e-input" id="eName" type="text">
          <span class="e-label">Hodnocení</span>
          <div class="star-row" id="starRow">
            <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
          </div>
          <span class="e-label">Popis</span>
          <textarea class="e-textarea" id="eDesc"></textarea>
          <span class="e-label">Moje zápisky & zážitky</span>
          <textarea class="e-textarea" id="eNotes" style="min-height:80px"></textarea>
          <span class="e-label">Štítky (oddělené čárkou)</span>
          <input class="e-input" id="eTags" type="text">
          <div class="photo-upload-row">
            <button class="photo-upload-btn" id="photoUploadBtn">📸 Přidat vlastní foto</button>
            <input type="file" id="photoFileInput" accept="image/*" multiple style="display:none">
          </div>
          <button class="save-btn" id="saveBtn">💾 Uložit</button>
          <button class="cancel-btn" id="cancelBtn">Zrušit</button>
        </div>
      </div>
    </div>
  </div>
</div>

// ── Storage ──
function ud(id){ try{ const d=localStorage.getItem('tf_u_'+id); return d?JSON.parse(d):{}; }catch(e){return {};} }
function saveUd(id,o){ localStorage.setItem('tf_u_'+id,JSON.stringify(o)); }
function extraPhotos(id){ try{ const d=localStorage.getItem('tf_ep_'+id); return d?JSON.parse(d):[]; }catch(e){return [];} }
function saveExtra(id,a){ try{ localStorage.setItem('tf_ep_'+id,JSON.stringify(a)); }catch(e){ alert('Úložiště je plné'); } }

// ── Sidebar ──
function buildSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  const cats = [...new Set(PLACES.map(p=>p.cat))];
  cats.forEach(cat => {
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.textContent = cat;
    sb.appendChild(lbl);
    PLACES.filter(p=>p.cat===cat).forEach(p => {
      const u = ud(p.id);
      const btn = document.createElement('button');
      btn.className = 'place-btn';
      btn.dataset.id = p.id;
      const stars = u.rating ? '★'.repeat(u.rating) : '';
      btn.innerHTML = `<span>${p.emoji}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>${stars?`<span class="pb-stars">${stars}</span>`:''}`;
      btn.addEventListener('click', ()=>openPlace(p.id));
      sb.appendChild(btn);
    });
  });
}

// ── Pins ──
function buildPins(){
  const container = document.getElementById('pinsContainer');
  container.innerHTML = '';
  // Get actual rendered size of the SVG
  PLACES.forEach(p => {
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.dataset.id = p.id;
    pin.style.left = p.x + '%';
    pin.style.top = p.y + '%';
    pin.style.pointerEvents = 'auto';
    pin.innerHTML = `<div class="pin-dot" style="background:${p.color}"><span class="pin-emoji">${p.emoji}</span></div>`;
    pin.addEventListener('click', ()=>openPlace(p.id));
    container.appendChild(pin);
  });
}

// ── Current state ──
let currentId = null;
let currentPhotos = [];
let currentPhotoIdx = 0;
let currentRating = 0;

function getAllPhotos(p){
  const bundled = p.photo ? [p.photo] : [];
  const extra = extraPhotos(p.id);
  return [...bundled, ...extra];
}

function openPlace(id){
  currentId = id;
  const p = PLACES.find(x=>x.id===id);
  currentPhotos = getAllPhotos(p);
  currentPhotoIdx = 0;

  document.querySelectorAll('.place-btn').forEach(b=>b.classList.toggle('active',+b.dataset.id===id));
  document.querySelectorAll('.pin').forEach(b=>b.classList.toggle('active',+b.dataset.id===id));

  showViewMode(p);
  renderPhoto();
  document.getElementById('infoPanel').classList.add('open');
}

function closePanel(){
  document.getElementById('infoPanel').classList.remove('open');
  document.querySelectorAll('.place-btn, .pin').forEach(b=>b.classList.remove('active'));
  currentId = null;
}
document.getElementById('panelClose').addEventListener('click', closePanel);

function showViewMode(p){
  document.getElementById('viewPanel').style.display='block';
  document.getElementById('editPanel').style.display='none';
  const u = ud(p.id);
  document.getElementById('vCat').textContent = p.cat;
  document.getElementById('vName').textContent = p.emoji+' '+p.name;
  const r = u.rating||0;
  document.getElementById('vStars').textContent = r ? '★'.repeat(r)+'☆'.repeat(5-r) : '☆☆☆☆☆';
  document.getElementById('vRatingText').textContent = r ? ['','Slabé','Ujde','Dobré','Skvělé','Perfektní!'][r] : 'Zatím nehodnoceno';
  document.getElementById('vDesc').textContent = p.desc;
  const notes = u.notes||'';
  const nb = document.getElementById('vNotesBlock');
  if(notes){ nb.style.display='block'; document.getElementById('vNotes').textContent=notes; }
  else { nb.style.display='none'; }
  const tags = u.tags||p.facts||[];
  document.getElementById('vTags').innerHTML = tags.map(t=>`<span class="p-tag">${t}</span>`).join('');
}

function renderPhoto(){
  const wrap = document.getElementById('panelPhotoWrap');
  const nav = document.getElementById('photoNav');
  wrap.innerHTML = '';
  nav.innerHTML = '';
  if(currentPhotos.length===0){
    const ph = document.createElement('div');
    ph.className = 'panel-photo-placeholder';
    const p = PLACES.find(x=>x.id===currentId);
    ph.textContent = p ? p.emoji : '🏝️';
    wrap.appendChild(ph);
    return;
  }
  const img = document.createElement('img');
  img.className = 'panel-photo';
  img.src = currentPhotos[currentPhotoIdx];
  wrap.appendChild(img);
  if(currentPhotos.length>1){
    nav.innerHTML = currentPhotos.map((_,i)=>`<div class="photo-dot${i===currentPhotoIdx?' active':''}" data-i="${i}"></div>`).join('');
    nav.querySelectorAll('.photo-dot').forEach(d=>d.addEventListener('click',e=>{
      currentPhotoIdx=+e.target.dataset.i; renderPhoto();
    }));
  }
}

// ── Edit ──
document.getElementById('editBtn').addEventListener('click',()=>{
  if(!currentId) return;
  const p = PLACES.find(x=>x.id===currentId);
  const u = ud(currentId);
  currentRating = u.rating||0;
  document.getElementById('eName').value = p.name;
  document.getElementById('eDesc').value = p.desc;
  document.getElementById('eNotes').value = u.notes||'';
  document.getElementById('eTags').value = (u.tags||p.facts||[]).join(', ');
  updateStars(currentRating);
  document.getElementById('viewPanel').style.display='none';
  document.getElementById('editPanel').style.display='block';
});

function updateStars(r){
  document.querySelectorAll('#starRow span').forEach(s=>s.classList.toggle('on',+s.dataset.v<=r));
}
document.querySelectorAll('#starRow span').forEach(s=>{
  s.addEventListener('click',()=>{ currentRating=+s.dataset.v; updateStars(currentRating); });
  s.addEventListener('mouseenter',()=>document.querySelectorAll('#starRow span').forEach(x=>x.classList.toggle('on',+x.dataset.v<=+s.dataset.v)));
  s.addEventListener('mouseleave',()=>updateStars(currentRating));
});

document.getElementById('saveBtn').addEventListener('click',()=>{
  if(!currentId) return;
  const p = PLACES.find(x=>x.id===currentId);
  p.name = document.getElementById('eName').value.trim()||p.name;
  p.desc = document.getElementById('eDesc').value.trim();
  const notes = document.getElementById('eNotes').value.trim();
  const tags = document.getElementById('eTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  saveUd(currentId,{rating:currentRating,notes,tags});
  buildSidebar();
  showViewMode(p);
  document.getElementById('viewPanel').style.display='block';
  document.getElementById('editPanel').style.display='none';
  document.querySelectorAll('.place-btn').forEach(b=>b.classList.toggle('active',+b.dataset.id===currentId));
});

document.getElementById('cancelBtn').addEventListener('click',()=>{
  const p = PLACES.find(x=>x.id===currentId);
  showViewMode(p);
  document.getElementById('viewPanel').style.display='block';
  document.getElementById('editPanel').style.display='none';
});

// ── Photo upload ──
document.getElementById('photoUploadBtn').addEventListener('click',()=>document.getElementById('photoFileInput').click());
document.getElementById('photoFileInput').addEventListener('change',e=>{
  const files = Array.from(e.target.files);
  if(!files.length) return;
  let done=0;
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=ev=>{
      const extra=extraPhotos(currentId);
      extra.push(ev.target.result);
      saveExtra(currentId,extra);
      currentPhotos=getAllPhotos(PLACES.find(x=>x.id===currentId));
      currentPhotoIdx=currentPhotos.length-1;
      done++;
      if(done===files.length) renderPhoto();
    };
    r.readAsDataURL(file);
  });
  e.target.value='';
});

// ── Init ──
buildSidebar();
buildPins();
</script>
</body>
</html>
